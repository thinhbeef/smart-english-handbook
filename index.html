<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Smart English Handbook – Grade 5</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --r:#FF6B6B; --o:#FF9F43; --y:#FECA57; --g:#1DD1A1; --b:#54A0FF;
  --p:#A29BFE; --pk:#FD79A8; --tl:#48DBFB;
  --bg:#FFFEF7; --card:#FFFFFF; --txt:#2D3436; --txt2:#636E72;
  --shadow:0 4px 20px rgba(0,0,0,0.08);
  --shadow2:0 8px 32px rgba(0,0,0,0.14);
  --radius:20px; --radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Baloo 2','Nunito',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:90px;overflow-x:hidden}

/* RAINBOW BG STRIP */
.rainbow-strip{height:6px;background:linear-gradient(90deg,#FF6B6B,#FF9F43,#FECA57,#1DD1A1,#54A0FF,#A29BFE,#FD79A8)}

/* HEADER */
.app-header{background:#fff;padding:1rem 1.2rem 0.8rem;text-align:center;box-shadow:var(--shadow);position:relative}
.app-header .logo{font-size:2rem;margin-bottom:0.2rem}
.app-header h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.6rem;background:linear-gradient(135deg,#FF6B6B,#FF9F43,#FECA57,#1DD1A1,#54A0FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.app-header .sub{font-size:0.78rem;color:var(--txt2);margin-top:0.2rem;font-weight:600}
.streak-banner{display:inline-flex;align-items:center;gap:0.4rem;background:linear-gradient(135deg,#FF9F43,#FECA57);color:#fff;border-radius:20px;padding:4px 14px;font-size:0.8rem;font-weight:800;margin-top:0.5rem;box-shadow:0 3px 10px rgba(255,159,67,0.4)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #F0F0F0;display:flex;z-index:1000;box-shadow:0 -4px 20px rgba(0,0,0,0.1)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.6rem 0.3rem;gap:3px;cursor:pointer;border:none;background:none;color:var(--txt2);font-family:'Baloo 2','Nunito',sans-serif;font-size:0.65rem;font-weight:700;transition:all 0.2s;position:relative}
.nav-btn .nav-icon{font-size:1.5rem;transition:transform 0.2s}
.nav-btn.active{color:var(--b)}
.nav-btn.active .nav-icon{transform:scale(1.2)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--b);border-radius:0 0 4px 4px}

/* PAGES */
.page{display:none;padding:1rem;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SECTION HEADERS */
.section-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}

/* UNIT SELECTOR */
.unit-selector{display:flex;gap:0.5rem;overflow-x:auto;padding:0.3rem 0 0.8rem;scrollbar-width:thin;margin-bottom:1rem}
.unit-selector::-webkit-scrollbar{height:4px}
.unit-selector::-webkit-scrollbar-track{background:#f0f0f0;border-radius:4px}
.unit-selector::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.unit-pill{flex-shrink:0;border:2px solid transparent;border-radius:20px;padding:6px 14px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.2s;background:#F8F8F8;color:var(--txt2);white-space:nowrap}
.unit-pill.active{color:#fff;border-color:transparent;transform:scale(1.05)}

/* VOCAB CARDS */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.8rem}
.vocab-card{background:transparent;border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:box-shadow 0.25s,border-color 0.25s;border:2.5px solid transparent;perspective:1000px}
.vocab-card:hover{box-shadow:var(--shadow2)}
/* front/back rotation handled by card-inner */
.card-inner{position:relative;width:100%;height:200px;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(0.4,0.2,0.2,1)}
.vocab-card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:calc(var(--radius) - 2.5px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.8rem;gap:0.3rem;overflow:hidden}
.card-back{transform:rotateY(180deg);background:#fff;padding:0.75rem 0.9rem;align-items:flex-start;justify-content:flex-start;flex-direction:column;gap:0.3rem;overflow:hidden}
.card-emoji{font-size:2.5rem;line-height:1}
.card-word{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;text-align:center;line-height:1.2}
.card-pos{font-size:0.65rem;background:rgba(255,255,255,0.25);color:#fff;padding:2px 8px;border-radius:10px;font-weight:700}
.card-ipa{font-size:0.75rem;color:var(--txt2);font-style:italic;font-family:'Nunito',sans-serif}
.card-meaning{font-size:0.95rem;font-weight:800;color:var(--txt);font-family:'Baloo 2',sans-serif}
.card-example{font-size:0.72rem;color:var(--txt2);line-height:1.45;font-style:italic;border-left:3px solid;padding-left:0.5rem;margin-top:0.1rem;font-family:'Nunito',sans-serif}
.audio-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;background:rgba(255,255,255,0.3);color:#fff;transition:all 0.2s;z-index:2}
.audio-btn:hover{background:rgba(255,255,255,0.5);transform:scale(1.1)}
.flip-hint{font-size:0.6rem;color:rgba(255,255,255,0.7);position:absolute;bottom:8px;font-style:italic}

/* GRAMMAR NOTEBOOK */
.grammar-notebook{display:flex;flex-direction:column;gap:1rem}
.grammar-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border-left:5px solid}
.grammar-header{padding:1rem 1.2rem 0.8rem;cursor:pointer;display:flex;align-items:flex-start;gap:0.8rem;transition:background 0.2s}
.grammar-header:hover{background:#FAFAFA}
.grammar-icon{font-size:1.5rem;flex-shrink:0;margin-top:2px}
.grammar-title-group{flex:1}
.grammar-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1rem;margin-bottom:0.2rem}
.grammar-pattern{font-size:0.8rem;background:#F0F0F0;padding:4px 10px;border-radius:8px;font-family:'Baloo 2',monospace;color:var(--txt2);display:inline-block;margin-top:2px}
.grammar-toggle{font-size:1.2rem;color:var(--txt2);transition:transform 0.3s;flex-shrink:0}
.grammar-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px dashed #E0E0E0;margin-top:0}
.grammar-body.open{display:block;animation:fadeIn 0.2s ease}
.grammar-note{background:#FFFDE7;border:1px solid #FFF176;border-radius:10px;padding:0.7rem 1rem;font-size:0.8rem;color:#5D4037;margin:0.7rem 0;display:flex;gap:0.5rem;align-items:flex-start;line-height:1.5;font-family:'Baloo 2','Nunito',sans-serif}
.grammar-note::before{content:'💡';flex-shrink:0}
.grammar-examples{display:flex;flex-direction:column;gap:0.5rem}
.example-item{background:#F8F9FA;border-radius:10px;padding:0.6rem 0.9rem;font-size:0.82rem;border-left:3px solid}
.example-item .q{font-weight:700;color:var(--txt);margin-bottom:3px}
.example-item .a{color:#2ECC71;font-style:italic}

/* GAMES */
.game-selector{display:flex;gap:0.7rem;margin-bottom:1.2rem;flex-wrap:wrap}
.game-type-btn{flex:1;min-width:100px;background:#fff;border:2.5px solid #E0E0E0;border-radius:var(--radius-sm);padding:0.8rem 0.5rem;text-align:center;cursor:pointer;transition:all 0.2s;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.9rem;color:var(--txt2)}
.game-type-btn:hover{border-color:var(--b);color:var(--b)}
.game-type-btn.active{border-color:var(--b);background:#EBF5FF;color:var(--b)}
.game-type-btn .gi{font-size:1.6rem;display:block;margin-bottom:0.3rem}
.game-area{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.2rem;min-height:300px}
.game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.game-score{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1rem;background:linear-gradient(135deg,var(--y),var(--o));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.game-progress{height:8px;background:#F0F0F0;border-radius:10px;overflow:hidden;margin-bottom:1rem}
.game-progress-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--g),var(--b));transition:width 0.4s ease}
.q-label{font-size:0.75rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem}
.game-question{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1.1rem;color:var(--txt);margin-bottom:1rem;line-height:1.4}

/* DRAG DROP */
.dd-pairs{display:flex;gap:1.5rem;flex-wrap:wrap}
.dd-col{flex:1;min-width:140px}
.dd-col-title{font-size:0.72rem;font-weight:800;text-transform:uppercase;color:var(--txt2);margin-bottom:0.6rem;letter-spacing:0.5px}
.dd-item{background:#F8F8F8;border:2px dashed #E0E0E0;border-radius:12px;padding:0.6rem 0.8rem;margin-bottom:0.5rem;font-size:0.85rem;font-weight:700;cursor:grab;user-select:none;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.dd-item:active{cursor:grabbing;opacity:0.7}
.dd-item.dragging{opacity:0.5;background:#E3F2FD;border-color:var(--b)}
.dd-item.correct{background:#E8F5E9;border-color:#4CAF50;border-style:solid;color:#2E7D32}
.dd-item.wrong{background:#FFEBEE;border-color:#F44336;border-style:solid;color:#C62828}
.dd-slot{background:#FAFAFA;border:2px dashed #E0E0E0;border-radius:12px;padding:0.6rem 0.8rem;margin-bottom:0.5rem;font-size:0.85rem;color:#B0B0B0;min-height:44px;transition:all 0.2s;display:flex;align-items:center}
.dd-slot.drag-over{background:#E3F2FD;border-color:var(--b);color:var(--b)}
.dd-slot.filled{background:#fff;border-style:solid;border-color:#E0E0E0;color:var(--txt);font-weight:700}

/* TYPING GAME */
.typing-sentence{font-size:1rem;line-height:1.8;color:var(--txt);margin-bottom:1rem}
.blank-input{border:none;border-bottom:3px solid var(--b);background:transparent;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--b);width:120px;text-align:center;outline:none;padding:2px 4px;transition:all 0.2s}
.blank-input:focus{border-color:var(--p)}
.blank-input.correct{border-color:#4CAF50;color:#2E7D32}
.blank-input.wrong{border-color:#F44336;color:#C62828}
.typing-hint{font-size:0.8rem;color:var(--txt2);margin-top:0.5rem;display:flex;align-items:center;gap:0.3rem}
.check-btn{background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:12px;padding:0.6rem 1.5rem;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.2s;display:block;margin-top:0.8rem}
.check-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(84,160,255,0.4)}
.check-btn:active{transform:scale(0.97)}

/* REORDER */
.reorder-bank{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;min-height:50px;border:2px dashed #E0E0E0;border-radius:12px;padding:0.7rem}
.reorder-answer{display:flex;flex-wrap:wrap;gap:0.5rem;min-height:50px;border:2px dashed var(--b);border-radius:12px;padding:0.7rem;background:#F8FDFF}
.reorder-answer-label{font-size:0.7rem;font-weight:700;color:var(--b);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem}
.word-token{background:#fff;border:2px solid #E0E0E0;border-radius:10px;padding:5px 12px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;user-select:none;display:inline-flex;align-items:center}
.word-token:hover{border-color:var(--b);color:var(--b);background:#EBF5FF;transform:scale(1.03)}
.word-token.in-answer{background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border-color:transparent}
.word-token.in-answer:hover{opacity:0.8}
.word-token.correct{background:linear-gradient(135deg,#4CAF50,#2ECC71);border-color:transparent;color:#fff}
.word-token.wrong{background:linear-gradient(135deg,#F44336,#FF7043);border-color:transparent;color:#fff}


/* MULTIPLE CHOICE */
.mc-options{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-top:0.5rem}
@media(max-width:500px){.mc-options{grid-template-columns:1fr}}
.mc-opt{border:2.5px solid #E0E0E0;background:#fff;border-radius:14px;padding:0.7rem 1rem;
  font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:left;
  font-family:'Baloo 2',sans-serif;color:var(--txt);display:flex;align-items:center;gap:0.6rem;
  line-height:1.35}
.mc-opt:hover{border-color:var(--b);background:#EBF5FF;color:var(--b)}
.mc-opt.correct{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20}
.mc-opt.wrong{background:#FFEBEE;border-color:#F44336;color:#B71C1C}
.mc-opt.reveal{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20}
.mc-opt-letter{width:26px;height:26px;border-radius:50%;background:currentColor;
  display:flex;align-items:center;justify-content:center;font-size:0.72rem;
  font-weight:800;flex-shrink:0;opacity:0.18}
.mc-opt:hover .mc-opt-letter,.mc-opt.correct .mc-opt-letter,
.mc-opt.wrong .mc-opt-letter,.mc-opt.reveal .mc-opt-letter{opacity:0.25}
.explain-box{background:#FFF8E1;border:1.5px solid #FFE082;border-radius:10px;
  padding:0.6rem 0.9rem;font-size:0.8rem;color:#5D4037;margin-top:0.6rem;
  display:none;line-height:1.5;font-family:'Baloo 2',sans-serif}
.explain-box.show{display:flex;gap:0.4rem;align-items:flex-start}
.explain-box::before{content:'💡';flex-shrink:0}

/* FEEDBACK */
.feedback-box{border-radius:14px;padding:1rem;margin-top:0.8rem;text-align:center;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1.1rem;display:none;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.feedback-box.show{display:block}
.feedback-box.correct{background:#E8F5E9;color:#2E7D32;border:2px solid #A5D6A7}
.feedback-box.wrong{background:#FFEBEE;color:#C62828;border:2px solid #FFCDD2}
@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.next-btn{background:linear-gradient(135deg,var(--o),var(--y));color:#fff;border:none;border-radius:12px;padding:0.6rem 1.5rem;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;margin-top:0.6rem;display:none}
.next-btn.show{display:inline-block}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,159,67,0.4)}

/* GAME RESULT */
.game-result{text-align:center;padding:2rem;animation:popIn 0.4s ease}
.result-emoji{font-size:4rem;margin-bottom:0.5rem}
.result-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.8rem;background:linear-gradient(135deg,var(--o),var(--r));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-score{font-size:1rem;color:var(--txt2);margin:0.5rem 0 1rem}
.play-again-btn{background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:15px;padding:0.7rem 2rem;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1.1rem;cursor:pointer;transition:all 0.2s}
.play-again-btn:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(84,160,255,0.4)}

/* STREAK PAGE */
.streak-page-header{text-align:center;padding:1rem 0 1.5rem}
.big-streak{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:5rem;line-height:1;margin-bottom:0.3rem}
.streak-num{font-family:'Baloo 2',cursive;font-weight:800;font-size:4rem;background:linear-gradient(135deg,var(--o),var(--y));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block}
.streak-label{font-size:0.9rem;color:var(--txt2);font-weight:700}
.streak-sub{font-size:0.8rem;color:var(--txt2);margin-top:0.3rem}
.streak-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.2rem;margin-bottom:1rem}
.streak-card-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1rem;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.4rem}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:0.5rem}
.cal-day-label{text-align:center;font-size:0.65rem;font-weight:700;color:var(--txt2);padding:2px}
.cal-day{aspect-ratio:1;border-radius:6px;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:#ccc;transition:all 0.2s}
.cal-day.studied{background:linear-gradient(135deg,var(--g),#00B894);color:#fff}
.cal-day.today{box-shadow:0 0 0 2px var(--b);color:var(--b);background:#EBF5FF;font-weight:800}
.cal-day.studied.today{box-shadow:0 0 0 2px var(--y);background:linear-gradient(135deg,var(--o),var(--y));color:#fff}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:0.7rem}
.badge-item{background:#F8F8F8;border-radius:14px;padding:0.8rem 0.5rem;text-align:center;transition:all 0.2s;border:2px solid transparent}
.badge-item.earned{background:linear-gradient(135deg,#FFF8E1,#FFF3CD);border-color:#FFD54F}
.badge-item.earned:hover{transform:scale(1.05)}
.badge-emoji{font-size:2rem;display:block;margin-bottom:0.3rem}
.badge-name{font-size:0.68rem;font-weight:700;color:var(--txt2)}
.badge-item.earned .badge-name{color:#E65100}
.badge-lock{font-size:0.65rem;color:#CCC;margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:1rem}
.stat-card{background:linear-gradient(135deg,#F8F9FA,#F0F0F0);border-radius:14px;padding:0.8rem;text-align:center}
.stat-card .sv{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.6rem;background:linear-gradient(135deg,var(--b),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .sl{font-size:0.65rem;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.today-task{background:linear-gradient(135deg,#E8F5FF,#F0ECFF);border-radius:14px;padding:1rem;border:1.5px solid #BBDEFB;font-family:'Baloo 2',sans-serif}
.task-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:0.95rem;color:var(--b);margin-bottom:0.6rem}
.task-item{display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0;font-size:0.82rem;color:var(--txt2);border-bottom:1px solid rgba(0,0,0,0.05)}
.task-item:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:6px;background:#E0E0E0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}
.task-check.done{background:linear-gradient(135deg,var(--g),#00B894);color:#fff}
</style>
<style>
/* Vietnamese font fix */
.vn-text, .section-title, .nav-btn, .streak-banner, .app-header h1,
.app-header .sub, .unit-pill, .grammar-title, .grammar-note,
.example-item, .feedback-box, .result-title, .result-score,
.task-item, .streak-label, .streak-sub, .stat-card .sl,
.badge-name, .badge-lock, .today-task .task-title,
.dd-col-title, .q-label, .typing-hint, .reorder-answer-label,
.streak-card-title, .game-type-btn, .check-btn, .next-btn,
.play-again-btn, .quiz-next-btn, .cal-day-label,
.game-header, .game-score, h1, h2, h3, button, div, span, p {
  font-family: 'Baloo 2', 'Nunito', 'Segoe UI', system-ui, sans-serif !important;
}
/* Keep Fredoka only for purely decorative ASCII/number elements */
.streak-num, .big-streak, .stat-card .sv {
  font-family: 'Baloo 2', 'Fredoka One', sans-serif !important;
}
/* Card word (English words only - safe with Fredoka) */
.card-word {
  font-family: 'Fredoka One', 'Baloo 2', sans-serif !important;
}
/* Section titles with Vietnamese need Baloo 2 */
.section-title {

// ==================== NAVIGATION ====================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='streak') renderStreak();
  if(name==='games'){ buildGameUnitSelector(); initGame(currentGame); }
  updateStreakToday();
}

// ==================== SPEECH ====================
function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.85; u.pitch=1.1;
  speechSynthesis.speak(u);
}

// ==================== VOCAB ====================
function buildUnitSelector(containerId, onSelect, currentUnit){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = UNITS.map((u,i)=>`
    <button class="unit-pill ${i===currentUnit?'active':''}"
      style="${i===currentUnit?'background:'+u.color+';color:#fff;border-color:'+u.color:''}"
      onclick="${onSelect}(${i})">
      ${u.icon} Unit ${u.id}
    </button>`).join('');
}

function renderVocab(unitIdx){
  currentVocabUnit = unitIdx;
  buildUnitSelector('vocabUnitSelector','selectVocabUnit', unitIdx);
  const u = UNITS[unitIdx];
  document.getElementById('vocabContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.8rem">
      <span style="font-size:1.5rem">${u.icon}</span>
      <div>
        <div style="font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.1rem;color:${u.color}">Unit ${u.id}: ${u.title}</div>
        <div style="font-size:0.75rem;color:var(--txt2)">${u.vocab.length} từ · Nhấn vào thẻ để xem nghĩa</div>
      </div>
    </div>
    <div class="vocab-grid">
      ${u.vocab.map((w,i)=>buildVocabCard(w, u.color, i)).join('')}
    </div>`;
}

function buildVocabCard(w, color, idx){
  const posColors = {noun:'#FF6B6B',adj:'#FF9F43','v. phrase':'#1DD1A1','adv':'#54A0FF','prep':'#A29BFE','number':'#FD79A8','proper n.':'#FECA57','n. phrase':'#48DBFB','prep. phrase':'#48DBFB'};
  const bc = posColors[w.pos] || color;
  const safeWord = w.word.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const safeEx   = w.example.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `
  <div class="vocab-card" id="vc-${idx}" onclick="flipCard(${idx})" style="border-color:${color}55">
    <div class="card-inner">
      <div class="card-front" style="background:linear-gradient(145deg,${color}EE,${color}AA)">
        <button class="audio-btn" onclick="event.stopPropagation();speak('${safeWord}')">🔊</button>
        <div class="card-emoji">${w.icon}</div>
        <div class="card-word">${w.word}</div>
        <span class="card-pos">${w.pos}</span>
        <div class="flip-hint">👆 chạm để xem nghĩa</div>
      </div>
      <div class="card-back">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <span style="font-size:1.4rem">${w.icon}</span>
          <button onclick="event.stopPropagation();speak('${safeWord}')"
            style="border:none;background:${color}22;border-radius:8px;padding:3px 10px;font-size:0.72rem;cursor:pointer;color:${color};font-weight:700;font-family:'Baloo 2',sans-serif">🔊 Nghe</button>
        </div>
        <div style="font-family:'Nunito',sans-serif;font-size:0.68rem;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px">Phiên âm</div>
        <div class="card-ipa">${w.ipa}</div>
        <div style="width:100%;height:1.5px;background:${color}22;margin:3px 0"></div>
        <div class="card-meaning" style="font-size:1rem">${w.meaning}</div>
        <div class="card-example" style="border-color:${bc};font-size:0.73rem">${w.example}</div>
        <button onclick="event.stopPropagation();speak('${safeEx}')"
          style="align-self:flex-end;border:none;background:${bc}18;border-radius:8px;padding:3px 10px;font-size:0.68rem;cursor:pointer;color:${bc};font-weight:700;font-family:'Baloo 2',sans-serif;margin-top:auto">
          🔊 Ví dụ
        </button>
      </div>
    </div>
  </div>`;
}

function flipCard(idx){
  const card = document.getElementById('vc-'+idx);
  card.classList.toggle('flipped');
  if(card.classList.contains('flipped')) card.style.boxShadow='0 8px 28px rgba(0,0,0,0.15)';
  else card.style.boxShadow='';
}

function selectVocabUnit(i){ renderVocab(i); }

let currentGrammarUnit = 0;

function renderGrammar(unitIdx){
  currentGrammarUnit = unitIdx;
  buildUnitSelector('grammarUnitSelector','selectGrammarUnit', unitIdx);
  const u = UNITS[unitIdx];
  const colors = ['#FF6B6B','#1DD1A1','#54A0FF','#FF9F43','#A29BFE','#FD79A8','#FECA57','#48DBFB'];
  document.getElementById('grammarContent').innerHTML = u.grammar.map((g,i)=>{
    const c = colors[i % colors.length];
    return `
    <div class="grammar-card" style="border-left-color:${c}">
      <div class="grammar-header" onclick="toggleGrammar(${unitIdx},${i})">
        <div class="grammar-icon" style="background:${c}22;border-radius:10px;padding:6px">${['📌','💡','🔑','⭐'][i%4]}</div>
        <div class="grammar-title-group">
          <div class="grammar-title" style="color:${c}">${g.title}</div>
          <div class="grammar-pattern" style="background:${c}15;color:${c}">${g.pattern}</div>
        </div>
        <div class="grammar-toggle" id="gt-${unitIdx}-${i}">▼</div>
      </div>
      <div class="grammar-body" id="gb-${unitIdx}-${i}">
        <div style="margin-top:0.7rem">
          <div style="font-size:0.72rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Cấu trúc trả lời</div>
          <div style="background:${c}10;border:1.5px solid ${c}44;border-radius:10px;padding:0.6rem 0.9rem;font-family:monospace;font-size:0.85rem;color:${c};font-weight:700">${g.answer}</div>
        </div>
        <div class="grammar-note">${g.note}</div>
        <div style="font-size:0.72rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Ví dụ</div>
        <div class="grammar-examples">
          ${g.examples.map(ex=>`
          <div class="example-item" style="border-left-color:${c}">
            <div class="q">❓ ${ex.q}</div>
            <div class="a">✅ ${ex.a}</div>
          </div>`).join('')}
        </div>
        <div style="margin-top:0.8rem">
          <button onclick="speak('${g.pattern.replace(/'/g,"\'")}'); event.stopPropagation()" style="background:${c}15;border:1.5px solid ${c}44;border-radius:10px;padding:5px 14px;font-size:0.75rem;font-family:'Baloo 2',sans-serif;font-weight:700;color:${c};cursor:pointer">🔊 Nghe mẫu câu</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleGrammar(u,i){
  const body = document.getElementById('gb-'+u+'-'+i);
  const icon = document.getElementById('gt-'+u+'-'+i);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  icon.textContent = isOpen ? '▼' : '▲';
  icon.style.color = isOpen ? 'var(--txt2)' : 'var(--b)';
}

function selectGrammarUnit(i){ renderGrammar(i); }

// ==================== GAME STATE ====================
let currentGame = 'drag';
let currentGameUnit = 0;

// ==================== GAME UNIT SELECTOR ====================
function buildGameUnitSelector(){
  const el = document.getElementById('gameUnitSelector');
  if(!el) return;
  el.innerHTML = UNIT_GAMES.map((u,i)=>`
    <button class="unit-pill ${i===currentGameUnit?'active':''}"
      style="${i===currentGameUnit?'background:'+u.ucolor+';color:#fff;border-color:'+u.ucolor:''}"
      onclick="selectGameUnit(${i})">
      ${u.uicon} Unit ${u.uid}
    </button>`).join('');
}

function selectGameUnit(i){
  currentGameUnit = i;
  buildGameUnitSelector();
  initGame(currentGame);
}

function selectGame(type){
  currentGame = type;
  document.querySelectorAll('.game-type-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('gbtn-'+type).classList.add('active');
  initGame(type);
}

function initGame(type){
  const u = UNIT_GAMES[currentGameUnit];
  if(type==='drag') initDragGame(u);
  else if(type==='mc') initMCGame(u);
  else if(type==='typing') initTypingGame(u);
  else if(type==='reorder') initReorderGame(u);
}

// ==================== DRAG & DROP ====================
let ddState = {pairs:[],answers:{},score:0};

function initDragGame(u){
  const selected = [...u.drag].sort(()=>Math.random()-0.5);
  const meanings = [...selected].sort(()=>Math.random()-0.5);
  ddState = {pairs:selected, answers:{}, score:0};

  document.getElementById('gameArea').innerHTML = `
    <div class="game-header">
      <div style="font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.95rem;color:var(--txt2)">${u.uicon} Unit ${u.uid} · Kéo nghĩa vào đúng từ</div>
      <div class="game-score">⭐ <span id="ddScore">0</span>/${selected.length}</div>
    </div>
    <div class="game-progress"><div class="game-progress-bar" id="ddBar" style="width:0%"></div></div>
    <div class="dd-pairs">
      <div class="dd-col">
        <div class="dd-col-title">🔤 Từ tiếng Anh</div>
        ${selected.map((p,i)=>`
        <div class="dd-slot" id="slot-${i}" data-idx="${i}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="dropItem(event,${i})">
          <span style="margin-right:0.5rem;font-size:1.1rem">${p.icon}</span>${p.word}
        </div>`).join('')}
      </div>
      <div class="dd-col">
        <div class="dd-col-title">📖 Nghĩa tiếng Việt</div>
        ${meanings.map((p,i)=>`
        <div class="dd-item" id="dditem-${i}" draggable="true" data-meaning="${p.meaning}" data-word="${p.word}"
          ondragstart="dragStart(event,'${p.meaning.replace(/'/g,"\\'")}','${p.word.replace(/'/g,"\\'")}')">
          ${p.meaning}
        </div>`).join('')}
      </div>
    </div>
    <div class="feedback-box" id="ddFb"></div>`;
  addTouchDrag();
}

function dragStart(e,meaning,word){
  e.dataTransfer.setData('meaning',meaning);
  e.dataTransfer.setData('word',word);
  e.target.classList.add('dragging');
}

function dropItem(e,idx){
  e.preventDefault();
  const slot = document.getElementById('slot-'+idx);
  slot.classList.remove('drag-over');
  if(ddState.answers[idx]) return;
  const meaning = e.dataTransfer.getData('meaning');
  const correct = ddState.pairs[idx].meaning === meaning;
  document.querySelectorAll('.dd-item').forEach(el=>{if(el.dataset.meaning===meaning) el.style.opacity=correct?'0.3':'1';});
  if(correct){
    slot.innerHTML=`<span style="margin-right:0.4rem">${ddState.pairs[idx].icon}</span>${meaning}`;
    slot.classList.add('filled','correct');
    ddState.answers[idx]=true;
    ddState.score++;
    document.getElementById('ddScore').textContent=ddState.score;
    document.getElementById('ddBar').style.width=(ddState.score/ddState.pairs.length*100)+'%';
    showFbDd('✅ Đúng! "'+ddState.pairs[idx].word+'" = '+meaning,'correct');
    if(ddState.score===ddState.pairs.length) setTimeout(()=>{
      document.getElementById('gameArea').innerHTML=`<div class="game-result"><div class="result-emoji">🏆</div><div class="result-title">Xuất sắc!</div><div class="result-score">Ghép đúng tất cả ${ddState.score}/${ddState.pairs.length} cặp từ!</div><button class="play-again-btn" onclick="initGame('drag')">🎮 Chơi lại</button></div>`;
      recordStudy();
    },700);
  } else {
    slot.classList.add('wrong');
    setTimeout(()=>slot.classList.remove('wrong'),800);
    showFbDd('❌ Chưa đúng! Thử lại nhé!','wrong');
  }
}

function showFbDd(msg,type){
  const fb=document.getElementById('ddFb');
  fb.textContent=msg; fb.className='feedback-box show '+type;
  setTimeout(()=>fb.classList.remove('show'),1800);
}

function addTouchDrag(){
  let dragged=null;
  document.querySelectorAll('.dd-item').forEach(el=>{
    el.addEventListener('touchstart',e=>{dragged=el;el.style.opacity='0.6';},{passive:true});
    el.addEventListener('touchend',e=>{
      if(!dragged) return;
      const t=e.changedTouches[0];
      const target=document.elementFromPoint(t.clientX,t.clientY);
      const slot=target?.closest('.dd-slot');
      if(slot){
        const idx=parseInt(slot.dataset.idx);
        if(!isNaN(idx)&&!ddState.answers[idx]){
          const meaning=dragged.dataset.meaning;
          const correct=ddState.pairs[idx].meaning===meaning;
          dragged.style.opacity=correct?'0.3':'1';
          if(correct){
            slot.innerHTML=`<span style="margin-right:0.4rem">${ddState.pairs[idx].icon}</span>${meaning}`;
            slot.classList.add('filled','correct');
            ddState.answers[idx]=true; ddState.score++;
            document.getElementById('ddScore').textContent=ddState.score;
            document.getElementById('ddBar').style.width=(ddState.score/ddState.pairs.length*100)+'%';
            showFbDd('✅ Đúng!','correct');
            if(ddState.score===ddState.pairs.length) setTimeout(()=>{
              document.getElementById('gameArea').innerHTML=`<div class="game-result"><div class="result-emoji">🏆</div><div class="result-title">Xuất sắc!</div><div class="result-score">Hoàn thành ${ddState.score}/${ddState.pairs.length}!</div><button class="play-again-btn" onclick="initGame('drag')">🎮 Chơi lại</button></div>`;
              recordStudy();
            },700);
          } else showFbDd('❌ Chưa đúng!','wrong');
        }
      }
      dragged=null;
    },{passive:true});
  });
}

// ==================== MULTIPLE CHOICE ====================
let mcState = {data:[],idx:0,score:0};

function initMCGame(u){
  mcState = {data:[...u.mc].sort(()=>Math.random()-0.5), idx:0, score:0};
  renderMCQ(u);
}

function renderMCQ(u){
  if(!u) u = UNIT_GAMES[currentGameUnit];
  const q = mcState.data[mcState.idx];
  const total = mcState.data.length;
  const letters = ['A','B','C','D'];
  document.getElementById('gameArea').innerHTML = `
    <div class="game-header">
      <div style="font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.95rem;color:var(--txt2)">${u.uicon} Unit ${u.uid} · Câu ${mcState.idx+1}/${total}</div>
      <div class="game-score">⭐ <span id="mcScore">${mcState.score}</span>/${total}</div>
    </div>
    <div class="game-progress"><div class="game-progress-bar" id="mcBar" style="width:${mcState.idx/total*100}%"></div></div>
    <div class="q-label">Chọn đáp án đúng</div>
    <div class="game-question">${q.q}</div>
    <div class="mc-options" id="mcOpts">
      ${q.opts.map((o,i)=>`
      <button class="mc-opt" id="mcopt-${i}" onclick="checkMC(${i})">
        <span class="mc-opt-letter" style="background:${['#FF6B6B','#FF9F43','#54A0FF','#1DD1A1'][i]};opacity:0.2;color:${['#FF6B6B','#FF9F43','#54A0FF','#1DD1A1'][i]}">${letters[i]}</span>
        ${o}
      </button>`).join('')}
    </div>
    <div class="explain-box" id="mcExplain"></div>
    <button class="next-btn" id="mcNext" onclick="nextMC()">Câu tiếp ▶</button>`;
}

function checkMC(chosen){
  const q = mcState.data[mcState.idx];
  const opts = document.querySelectorAll('.mc-opt');
  opts.forEach(o=>o.onclick=null);
  const explain = document.getElementById('mcExplain');
  const next = document.getElementById('mcNext');
  if(chosen===q.ans){
    opts[chosen].classList.add('correct');
    mcState.score++;
    document.getElementById('mcScore').textContent=mcState.score;
  } else {
    opts[chosen].classList.add('wrong');
    opts[q.ans].classList.add('reveal');
  }
  explain.textContent=q.explain;
  explain.className='explain-box show';
  next.className='next-btn show';
  const pct=(mcState.idx+1)/mcState.data.length*100;
  document.getElementById('mcBar').style.width=pct+'%';
}

function nextMC(){
  mcState.idx++;
  if(mcState.idx>=mcState.data.length){
    const s=mcState.score, t=mcState.data.length, pct=Math.round(s/t*100);
    document.getElementById('gameArea').innerHTML=`<div class="game-result">
      <div class="result-emoji">${pct>=80?'🏆':pct>=60?'🌟':'💪'}</div>
      <div class="result-title">${pct>=80?'Tuyệt vời!':pct>=60?'Khá tốt!':'Cố lên nhé!'}</div>
      <div class="result-score">Đúng ${s}/${t} câu (${pct}%)</div>
      <button class="play-again-btn" onclick="initGame('mc')">🎮 Chơi lại</button>
    </div>`;
    if(pct>=60) recordStudy();
  } else renderMCQ();
}

// ==================== TYPING ====================
let typingState = {data:[],idx:0,score:0};

function initTypingGame(u){
  typingState = {data:[...u.typing].sort(()=>Math.random()-0.5), idx:0, score:0};
  renderTypingQ(u);
}

function renderTypingQ(u){
  if(!u) u=UNIT_GAMES[currentGameUnit];
  const q=typingState.data[typingState.idx];
  const total=typingState.data.length;
  document.getElementById('gameArea').innerHTML=`
    <div class="game-header">
      <div style="font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.95rem;color:var(--txt2)">${u.uicon} Unit ${u.uid} · Câu ${typingState.idx+1}/${total}</div>
      <div class="game-score">⭐ <span id="typScore">${typingState.score}</span>/${total}</div>
    </div>
    <div class="game-progress"><div class="game-progress-bar" id="typBar" style="width:${typingState.idx/total*100}%"></div></div>
    <div class="q-label">Điền từ còn thiếu vào chỗ trống</div>
    <div class="typing-sentence">${q.before} <input type="text" class="blank-input" id="blankInput" placeholder="..." autocomplete="off" autocorrect="off" spellcheck="false"> ${q.after}</div>
    <div class="typing-hint">💡 Gợi ý: ${q.hint}</div>
    <button class="check-btn" onclick="checkTyping()">✔️ Kiểm tra</button>
    <div class="feedback-box" id="typFb"></div>
    <button class="next-btn" id="typNext" onclick="nextTyping()">Câu tiếp ▶</button>`;
  const inp=document.getElementById('blankInput');
  inp.addEventListener('keypress',e=>{if(e.key==='Enter') checkTyping();});
  inp.focus();
}

function checkTyping(){
  const q=typingState.data[typingState.idx];
  const val=document.getElementById('blankInput').value.trim().toLowerCase();
  const correct=val===q.blank.toLowerCase();
  const input=document.getElementById('blankInput');
  const fb=document.getElementById('typFb');
  input.disabled=true;
  if(correct){
    input.classList.add('correct');
    fb.textContent='🎉 Chính xác! "'+q.blank+'" là đúng!';
    fb.className='feedback-box show correct';
    typingState.score++;
    document.getElementById('typScore').textContent=typingState.score;
  } else {
    input.classList.add('wrong');
    input.value=q.blank;
    fb.textContent='❌ Chưa đúng. Đáp án là: "'+q.blank+'"';
    fb.className='feedback-box show wrong';
  }
  document.getElementById('typNext').className='next-btn show';
  document.getElementById('typBar').style.width=((typingState.idx+1)/typingState.data.length*100)+'%';
}

function nextTyping(){
  typingState.idx++;
  if(typingState.idx>=typingState.data.length){
    const s=typingState.score,t=typingState.data.length,pct=Math.round(s/t*100);
    document.getElementById('gameArea').innerHTML=`<div class="game-result">
      <div class="result-emoji">${pct>=80?'🏆':pct>=60?'🌟':'💪'}</div>
      <div class="result-title">${pct>=80?'Tuyệt vời!':pct>=60?'Khá tốt!':'Cố lên nhé!'}</div>
      <div class="result-score">Điền đúng ${s}/${t} câu (${pct}%)</div>
      <button class="play-again-btn" onclick="initGame('typing')">🎮 Chơi lại</button>
    </div>`;
    if(pct>=60) recordStudy();
  } else renderTypingQ();
}

// ==================== REORDER ====================
let reorderState={data:[],idx:0,score:0};

function initReorderGame(u){
  reorderState={data:[...u.reorder].sort(()=>Math.random()-0.5),idx:0,score:0};
  renderReorderQ(u);
}

function renderReorderQ(u){
  if(!u) u=UNIT_GAMES[currentGameUnit];
  const q=reorderState.data[reorderState.idx];
  const shuffled=[...q.words].sort(()=>Math.random()-0.5);
  const total=reorderState.data.length;
  document.getElementById('gameArea').innerHTML=`
    <div class="game-header">
      <div style="font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.95rem;color:var(--txt2)">${u.uicon} Unit ${u.uid} · Câu ${reorderState.idx+1}/${total}</div>
      <div class="game-score">⭐ <span id="reScore">${reorderState.score}</span>/${total}</div>
    </div>
    <div class="game-progress"><div class="game-progress-bar" id="reBar" style="width:${reorderState.idx/total*100}%"></div></div>
    <div class="q-label">Sắp xếp thành câu đúng · 💡 ${q.hint}</div>
    <div class="reorder-answer-label">📝 Câu của bạn (nhấn từ để xóa):</div>
    <div class="reorder-answer" id="answerArea"></div>
    <div style="font-size:0.72rem;color:var(--txt2);margin:0.4rem 0 0.3rem;font-weight:700">🔤 Kho từ (nhấn để thêm):</div>
    <div class="reorder-bank" id="bankArea">
      ${shuffled.map((w,i)=>`<span class="word-token" id="tok-${i}" onclick="moveToken(${i},'bank')">${w}</span>`).join('')}
    </div>
    <button class="check-btn" onclick="checkReorder()">✔️ Kiểm tra câu</button>
    <div class="feedback-box" id="reFb"></div>
    <button class="next-btn" id="reNext" onclick="nextReorder()">Câu tiếp ▶</button>`;
}

function moveToken(idx,from){
  const tok=document.getElementById('tok-'+idx);
  const bank=document.getElementById('bankArea');
  const ans=document.getElementById('answerArea');
  if(!tok||!bank||!ans) return;
  if(from==='bank'){
    tok.classList.add('in-answer'); ans.appendChild(tok);
    tok.onclick=()=>moveToken(idx,'answer');
  } else {
    tok.classList.remove('in-answer'); bank.appendChild(tok);
    tok.onclick=()=>moveToken(idx,'bank');
  }
}

function checkReorder(){
  const q=reorderState.data[reorderState.idx];
  const tokens=document.getElementById('answerArea').querySelectorAll('.word-token');
  const userAns=Array.from(tokens).map(t=>t.textContent.trim()).join(' ');
  const correct=userAns.toLowerCase()===q.answer.toLowerCase();
  const fb=document.getElementById('reFb');
  tokens.forEach(t=>t.classList.add(correct?'correct':'wrong'));
  document.querySelectorAll('#bankArea .word-token, #answerArea .word-token').forEach(t=>t.onclick=null);
  if(correct){
    fb.textContent='🎉 Chính xác! Câu hoàn toàn đúng!';
    fb.className='feedback-box show correct';
    reorderState.score++;
    document.getElementById('reScore').textContent=reorderState.score;
  } else {
    fb.innerHTML='❌ Chưa đúng. Câu đúng: <strong>"'+q.answer+'"</strong>';
    fb.className='feedback-box show wrong';
  }
  document.getElementById('reNext').className='next-btn show';
  document.getElementById('reBar').style.width=((reorderState.idx+1)/reorderState.data.length*100)+'%';
}

function nextReorder(){
  reorderState.idx++;
  if(reorderState.idx>=reorderState.data.length){
    const s=reorderState.score,t=reorderState.data.length,pct=Math.round(s/t*100);
    document.getElementById('gameArea').innerHTML=`<div class="game-result">
      <div class="result-emoji">${pct>=80?'🏆':pct>=60?'🌟':'💪'}</div>
      <div class="result-title">${pct>=80?'Tuyệt vời!':pct>=60?'Khá tốt!':'Cố lên nhé!'}</div>
      <div class="result-score">Đúng ${s}/${t} câu (${pct}%)</div>
      <button class="play-again-btn" onclick="initGame('reorder')">🎮 Chơi lại</button>
    </div>`;
    if(pct>=60) recordStudy();
  } else renderReorderQ();
}


// ==================== STREAK ====================
function getTodayStr(){
  return new Date().toISOString().split('T')[0];
}
function getStreak(){
  return JSON.parse(localStorage.getItem('eng5_streak')||'{"current":0,"best":0,"days":[],"total":0,"words":0}');
}
function saveStreak(s){
  localStorage.setItem('eng5_streak', JSON.stringify(s));
}

function recordStudy(){
  const s = getStreak();
  const today = getTodayStr();
  if(s.days.includes(today)) return;
  s.days.push(today);
  s.total++;
  s.words += Math.floor(Math.random()*5)+3;
  // Calculate streak
  s.days.sort();
  let cur = 1;
  for(let i=s.days.length-1;i>0;i--){
    const d1 = new Date(s.days[i]), d2 = new Date(s.days[i-1]);
    const diff = (d1-d2)/(1000*60*60*24);
    if(diff===1) cur++;
    else break;
  }
  s.current = cur;
  s.best = Math.max(s.best, cur);
  saveStreak(s);
  updateStreakToday();
  updateHeaderStreak();
}

function updateStreakToday(){
  const s = getStreak();
  const today = getTodayStr();
  const tasks = [
    {label:'Xem từ vựng hôm nay', done: s.days.includes(today)},
    {label:'Làm ít nhất 1 trò chơi', done: s.days.includes(today)},
    {label:'Nghe phát âm 3 từ', done: false}
  ];
  const el = document.getElementById('todayTasks');
  if(el) el.innerHTML = tasks.map(t=>`
    <div class="task-item">
      <div class="task-check ${t.done?'done':''}">${t.done?'✓':''}</div>
      <span style="${t.done?'text-decoration:line-through;color:#aaa':''}">${t.label}</span>
    </div>`).join('');
}

function updateHeaderStreak(){
  const s = getStreak();
  document.getElementById('headerStreak').textContent = `🔥 ${s.current} ngày liên tiếp`;
}

function renderStreak(){
  const s = getStreak();
  document.getElementById('streakBigNum').textContent = s.current;
  document.getElementById('statTotal').textContent = s.total;
  document.getElementById('statBest').textContent = s.best;
  document.getElementById('statWords').textContent = s.words;
  document.getElementById('streakSubText').textContent = s.current>0 ? `Tuyệt vời! Duy trì ${s.current} ngày rồi đó!` : 'Hãy bắt đầu học hôm nay!';
  renderCalendar(s);
  renderBadges(s);
  updateStreakToday();
}

function renderCalendar(s){
  const labels = document.getElementById('calDayLabels');
  const grid = document.getElementById('calGrid');
  const days = ['CN','T2','T3','T4','T5','T6','T7'];
  labels.innerHTML = days.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  
  const today = new Date();
  const year = today.getFullYear(), month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = getTodayStr();
  
  let cells = '';
  for(let i=0;i<firstDay;i++) cells += `<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const studied = s.days.includes(dateStr);
    const isToday = dateStr === todayStr;
    cells += `<div class="cal-day ${studied?'studied':''} ${isToday?'today':''}">${d}</div>`;
  }
  grid.innerHTML = cells;
}

function renderBadges(s){
  const badges = [
    {emoji:'🌱',name:'Bắt đầu',desc:'Học ngày đầu tiên',earned:s.total>=1,req:1},
    {emoji:'🔥',name:'3 ngày',desc:'3 ngày liên tiếp',earned:s.best>=3,req:3},
    {emoji:'⭐',name:'7 ngày',desc:'1 tuần liên tiếp',earned:s.best>=7,req:7},
    {emoji:'🏅',name:'14 ngày',desc:'2 tuần liên tiếp',earned:s.best>=14,req:14},
    {emoji:'🏆',name:'30 ngày',desc:'1 tháng liên tiếp',earned:s.best>=30,req:30},
    {emoji:'📚',name:'10 từ',desc:'Học 10 từ vựng',earned:s.words>=10,req:10},
    {emoji:'🎯',name:'50 từ',desc:'Học 50 từ vựng',earned:s.words>=50,req:50},
    {emoji:'💎',name:'100 từ',desc:'Học 100 từ vựng',earned:s.words>=100,req:100}
  ];
  document.getElementById('badgesGrid').innerHTML = badges.map(b=>`
    <div class="badge-item ${b.earned?'earned':''}">
      <span class="badge-emoji">${b.earned?b.emoji:'🔒'}</span>
      <div class="badge-name">${b.name}</div>
      <div class="badge-lock">${b.earned?'✅ Đã đạt':''+b.req}</div>
    </div>`).join('');
}

// ==================== INIT ====================
function init(){
  renderVocab(0);
  renderGrammar(0);
  buildGameUnitSelector();
  initGame('drag');
  updateHeaderStreak();
  updateStreakToday();
  setTimeout(recordStudy, 5000);
}

init();
</script>
